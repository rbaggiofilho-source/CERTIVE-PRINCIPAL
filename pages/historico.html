                <div class="page-header">
                    <div>
                        <h2>📜 Histórico Geral de Serviços</h2>
                        <p>Consulte, filtre e gerencie todas as ordens de serviço registradas.</p>
                    </div>
                </div>

                <!-- Card de Filtros de Pesquisa -->
                <div class="panel-card" style="margin-bottom: 20px;">
                    <div class="panel-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h3><i class="ri-filter-3-line"></i> Filtros de Pesquisa</h3>
                        <button class="btn btn-secondary btn-sm" onclick="clearHistoricoFilters()">
                            <i class="ri-eraser-line"></i> Limpar Filtros
                        </button>
                    </div>
                    <div class="panel-card-body" style="padding: 16px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-placa">Placa</label>
                                <input type="text" id="hist-filter-placa" placeholder="EX: ABC1234" oninput="renderHistorico()" style="text-transform: uppercase;">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-cliente">Cliente (Nome / CPF / CNPJ)</label>
                                <input type="text" id="hist-filter-cliente" placeholder="Nome ou Documento" oninput="renderHistorico()" style="text-transform: uppercase;">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-servico">Serviço</label>
                                <select id="hist-filter-servico" onchange="renderHistorico()">
                                    <option value="">Todos os Serviços</option>
                                    <!-- Dinâmico via JS -->
                                </select>
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-valor">Valor do Serviço (R$)</label>
                                <input type="number" id="hist-filter-valor" placeholder="Valor exato" oninput="renderHistorico()" step="0.01">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-data-ini">Data Inicial</label>
                                <input type="date" id="hist-filter-data-ini" onchange="renderHistorico()">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-data-fim">Data Final</label>
                                <input type="date" id="hist-filter-data-fim" onchange="renderHistorico()">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-pagamento">Forma de Pagamento</label>
                                <select id="hist-filter-pagamento" onchange="renderHistorico()">
                                    <option value="">Todas</option>
                                    <option value="pix">PIX</option>
                                    <option value="especie">DINHEIRO (ESPÉCIE)</option>
                                    <option value="debito">CARTÃO DE DÉBITO</option>
                                    <option value="credito">CARTÃO DE CRÉDITO</option>
                                    <option value="faturamento">FATURAMENTO MENSAL</option>
                                    <option value="isento">ISENTO</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label for="hist-filter-status">Status da O.S.</label>
                                <select id="hist-filter-status" onchange="renderHistorico()">
                                    <option value="">Todos</option>
                                    <option value="aberta">ABERTA</option>
                                    <option value="paga">PAGA</option>
                                    <option value="em_execucao">EM VISTORIA</option>
                                    <option value="concluida_aprovada">APROVADA</option>
                                    <option value="concluida_reprovada">REPROVADA</option>
                                    <option value="cancelada">CANCELADA</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabela de O.S.s Filtradas -->
                <div class="panel-card">
                    <div class="panel-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h3><i class="ri-file-list-line"></i> Registros Encontrados</h3>
                        <span id="hist-total-count" style="font-size: 12px; font-weight: 600; color: var(--accent);">0 Ordens de Serviço</span>
                    </div>
                    <div class="panel-card-body" style="padding: 0;">
                        <div class="table-container" style="border: none; border-radius: 0; margin-bottom: 0;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Código</th>
                                        <th>Data/Hora</th>
                                        <th>Cliente / Placa</th>
                                        <th>Serviço</th>
                                        <th>Valor</th>
                                        <th>Forma</th>
                                        <th>Status</th>
                                        <th style="text-align: right; padding-right: 20px;">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="historico-services-list">
                                    <!-- Carregado via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
