                <div class="page-header">
                    <div>
                        <h2>🧾 Atendimento & Abertura de OS</h2>
                        <p>Gerencie vistorias veiculares, preços acordados e emissão de contratos.</p>
                    </div>
                </div>

                <div class="kpi-grid" id="atendimento-kpis">
                    <!-- KPIs do dia atualizados via JS -->
                </div>

                <div class="atendimento-layout">
                    <!-- Form de Nova OS -->
                    <div class="panel-card">
                        <div class="panel-card-header">
                            <h3><i class="ri-add-circle-line"></i> Nova Ficha de Vistoria</h3>
                        </div>
                        <div class="panel-card-body">
                            <!-- Tipo de Público -->
                            <label class="form-section-title"><span>1</span> Tipo de Cliente</label>
                            <div class="category-switcher">
                                <button class="cat-btn active" id="btn-cat-particular" onclick="selectClientType('particular')">Particular</button>
                                <button class="cat-btn" id="btn-cat-parceiro" onclick="selectClientType('parceiro')">Parceiro de Negócios</button>
                            </div>

                            <!-- Seleção de Parceiro (Oculto se particular) -->
                            <div class="form-group" id="form-group-parceiro" style="display: none;">
                                <label for="os-parceiro-select">Parceiro Conveniado</label>
                                <select id="os-parceiro-select" onchange="loadPartnerServices(this.value)">
                                    <option value="">Selecione o parceiro...</option>
                                    <!-- Carregado via JS -->
                                </select>
                            </div>

                            <!-- Catálogo de Serviços -->
                            <label class="form-section-title"><span>2</span> Catálogo de Serviços</label>
                            <div class="service-selector" id="service-selector">
                                <!-- Opções geradas via JS -->
                            </div>

                            <!-- Preço do Serviço -->
                            <div class="form-group">
                                <label for="os-valor">Valor cobrado (R$)</label>
                                <input type="number" step="0.01" id="os-valor" style="font-weight: 700; color: var(--success);" placeholder="0,00">
                                <small class="form-text" id="os-valor-warning" style="color: var(--text-muted); display: block; margin-top: 4px;">
                                    Tabela de balcão. Valor editável pelo atendente.
                                </small>
                            </div>

                            <!-- Dados do Cliente & Veículo -->
                            <label class="form-section-title"><span>3</span> Dados Fichados</label>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="os-placa">Placa do Veículo</label>
                                    <input type="text" id="os-placa" placeholder="ABC1D23" maxlength="8" style="text-transform: uppercase; font-weight: 700;">
                                </div>
                                <div class="form-group">
                                    <label for="os-renavam">Renavam</label>
                                    <input type="text" id="os-renavam" placeholder="Apenas números" maxlength="11">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="os-nome-cliente">Nome Completo do Solicitante</label>
                                <input type="text" id="os-nome-cliente" placeholder="Nome completo do condutor/proprietário">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="os-cpf-cliente">CPF ou CNPJ</label>
                                    <input type="text" id="os-cpf-cliente" placeholder="Apenas números">
                                </div>
                                <div class="form-group">
                                    <label for="os-celular-cliente">Celular (WhatsApp)</label>
                                    <input type="text" id="os-celular-cliente" placeholder="(48) 99999-9999">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="os-obs">Observações do Veículo (Modelo, Ano, Cor)</label>
                                <input type="text" id="os-obs" placeholder="EX: HONDA CIVIC 2020 CINZA" required>
                            </div>

                            <!-- Checklist de Documentação -->
                            <label class="form-section-title"><span>4</span> Validação de Documentos</label>
                            <label class="form-check">
                                <input type="checkbox" id="os-doc-veiculo">
                                <span>Apresentou Documento do Veículo (CRLV / CRLV-e)</span>
                            </label>
                            <label class="form-check" style="margin-bottom: 20px;">
                                <input type="checkbox" id="os-doc-identificacao">
                                <span>Apresentou Documento de Identificação Oficial do Solicitante</span>
                            </label>

                            <!-- Forma de Pagamento -->
                            <label class="form-section-title"><span>5</span> Cobrança</label>
                            <div class="form-group">
                                <label for="os-pagamento">Forma de Pagamento</label>
                                <select id="os-pagamento">
                                    <option value="pix">Pix (Transferência Online)</option>
                                    <option value="debito">Cartão de Débito</option>
                                    <option value="credito">Cartão de Crédito</option>
                                    <option value="especie">Dinheiro (Espécie)</option>
                                    <option value="faturamento" id="opt-pagamento-faturamento" disabled>Faturamento Mensal (Apenas parceiros habilitados)</option>
                                </select>
                            </div>

                            <!-- Marcação DETRAN -->
                            <label class="form-section-title"><span>6</span> Controle DETRAN-SC</label>
                            <label class="form-check" style="margin-bottom: 24px;">
                                <input type="checkbox" id="os-detran">
                                <span>O.S. Oficial aberta no sistema do DETRAN-SC (Registro manual)</span>
                            </label>

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                <button class="btn btn-secondary" onclick="clearOSForm()">
                                    <i class="ri-eraser-line"></i> Limpar
                                </button>
                                <button class="btn btn-primary" onclick="submitOSForm()">
                                    <i class="ri-save-line"></i> Registrar O.S.
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Pipeline/Lista de Serviços do Dia -->
                    <div style="display: flex; flex-direction: column; gap: 24px;">
                        <div class="panel-card" style="margin-bottom: 0;">
                            <div class="panel-card-header" style="display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <h3><i class="ri-history-line"></i> Serviços do Dia / Histórico</h3>
                                </div>
                                <div style="display: flex; align-items: center; gap: 12px; flex-grow: 1; justify-content: flex-end;">
                                    <div class="search-box-container" style="position: relative; width: 260px;">
                                        <i class="ri-search-line" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px;"></i>
                                        <input type="text" id="os-search-input" placeholder="Buscar O.S., Placa ou Cliente..." oninput="renderOSPipeline()" style="width: 100%; padding: 8px 12px 8px 32px; font-size: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); text-transform: uppercase;">
                                    </div>
                                    <button class="btn btn-secondary btn-sm" onclick="navigateTo('config')">
                                        <i class="ri-settings-line"></i> Preços e Taxas
                                    </button>
                                </div>
                            </div>
                            <div class="panel-card-body" style="padding: 0;">
                                <div class="table-container" style="border: none; border-radius: 0; margin-bottom: 0;">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Código</th>
                                                <th>Hora</th>
                                                <th>Solicitante / Placa</th>
                                                <th>Serviço</th>
                                                <th>Valor</th>
                                                <th>Forma</th>
                                                <th>Status</th>
                                                <th style="text-align: right; padding-right: 20px;">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody id="recent-services-list">
                                            <!-- Carregado via JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
