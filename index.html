<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certive Vistorias — Login</title>
    <meta name="description" content="Acesse o sistema de gestão Certive Vistorias.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<div class="login-overlay" id="login-overlay" style="position: relative; min-height: 100vh;">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm-5 7.93c.02-1.95 3.34-2.93 5-2.93s4.98.98 5 2.93C15.5 17.5 13.9 18 12 18s-3.5-.5-5-3.07z"/>
            </svg>
            <h2>CERTIVE</h2>
            <span>Vistorias Veiculares</span>
        </div>
        
        <div class="login-error" id="login-error">
            <i class="ri-error-warning-line"></i>
            <span id="login-error-text">Usuário ou senha inválidos.</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-username">Usuário</label>
                <input type="text" id="login-username" placeholder="Digite seu usuário" required>
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 14px;">
                <i class="ri-login-box-line"></i> Acessar Sistema
            </button>
        </form>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="supabase-db.js"></script>
<script>
// Minimal core functions for login page
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    const iconClass = type === 'success' ? 'ri-checkbox-circle-line' : (type === 'error' ? 'ri-error-warning-line' : 'ri-information-line');
    toast.innerHTML = `<i class="${iconClass}"></i><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

// Check if already logged in
if (localStorage.getItem('certive_session')) {
    window.location.href = 'app.html';
}

// Initialize
let db = {};
let currentSession = null;
let activeUnitId = 1;

async function initLogin() {
    await loadAllFromSupabase();
    console.log('[Certive Login] Operadores loaded:', db.operadores?.length || 0);
}

function handleLogin(event) {
    event.preventDefault();
    const loginInput = document.getElementById('login-username').value.trim();
    const passwordInput = document.getElementById('login-password').value.trim();
    const errorDiv = document.getElementById('login-error');

    const user = db.operadores.find(o => o.login.toLowerCase() === loginInput.toLowerCase() && o.senha === passwordInput && o.ativo);

    if (user) {
        localStorage.setItem('certive_session', JSON.stringify(user));
        errorDiv.style.display = 'none';
        showToast(`Bem-vindo, ${user.nome}!`, 'success');
        
        // Small delay so toast shows before redirect
        setTimeout(() => {
            window.location.href = 'app.html';
        }, 500);
    } else {
        errorDiv.style.display = 'flex';
        document.getElementById('login-error-text').textContent = "Usuário ou senha inválidos, ou operador inativo.";
    }
}

initLogin();
</script>
</body>
</html>
