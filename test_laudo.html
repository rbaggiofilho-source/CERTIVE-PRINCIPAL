    <!-- Import do novo gerador de PDF -->
    <script src="laudo_pdf_v2.js?v=8.3.0"></script>

    <script>
        // Inicializa a pré-visualização ao carregar a página
        window.addEventListener('load', () => {
            atualizarPreviewLaudo();
        });

        async function baixarPdfTeste() {
            try {
                const btn = document.querySelector('.btn-download');
                btn.innerHTML = `<i class="ri-loader-4-line ri-spin" style="font-size:16px;"></i> Gerando PDF...`;
                btn.disabled = true;

                const pdfBytes = await generateInspectionReport(999);
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'LAUDO_CAUTELAR_TESTE_ATO8I28.pdf';
                link.click();

                btn.innerHTML = `<i class="ri-file-pdf-line" style="font-size:16px;"></i> Baixar PDF`;
                btn.disabled = false;
            } catch (err) {
                console.error("Erro ao gerar PDF do template:", err);
                alert("Erro ao preencher o template editável do PDF: " + err.message);
                const btn = document.querySelector('.btn-download');
                btn.innerHTML = `<i class="ri-file-pdf-line" style="font-size:16px;"></i> Baixar PDF`;
                btn.disabled = false;
            }
        }
    </script>
